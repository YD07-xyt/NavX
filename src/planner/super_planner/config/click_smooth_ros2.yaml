fsm:
  click_goal_en: true
  click_goal_topic: "/goal_pose"
  click_height: 1.5
  click_yaw_en: true
  replan_rate: 15.0
  cmd_topic: "/planning/pos_cmd"
  mpc_cmd_topic: "/planning_cmd/poly_traj"
  timer_en: true

super_planner:
  backup_traj_en: true
  detailed_log_en: false
  visualization_en: true
  use_fov_cut: false
  print_log: false
  visual_process: false
  frontend_in_known_free: false
  goal_yaw_en: true
  goal_vel_en: false
  corridor_bound_dis: 1.0
  corridor_line_max_length: 1.2
  safe_corridor_line_max_length: 5.0
  iris_iter_num: 2
  obs_skip_num: 2
  replan_forward_dt: 0.1
  planning_horizon: 7.0
  sensing_horizon: -1
  receding_dis: 4.0
  robot_r: 0.2
  yaw_dot_max: 3.0
  # Yaw mode: 1 heading to velocity, 2 heading to goal
  yaw_mode: 1
  mpc_horizon: 15


traj_opt:
  switch:
    save_log_en: false
    print_optimizer_log: false

  boundary:
    max_vel: 5.0
    max_acc: 5.0
    max_jerk: 120.0
    max_omg: 2.5
    max_acc_thr: 20.0
    min_acc_thr: 6.0
    penna_margin: 0.05

  exp_traj:
    # 1 for xi 2 for pos
    pos_constraint_type: 1
    energy_cost_type: 4
    block_energy_cost: false
    opt_accuracy: 5.0e-6
    scale_factor: 1.0
    integral_reso: 15
    smooth_eps: 0.01
    penna_t: 12000.0
    penna_pos: 5.0e+6
    penna_vel: 5.0e+5
    penna_acc: 5.0e+5
    penna_jerk: -5.0e+5
    penna_attract: 1.0e+3
    penna_omg:  5.0e+5
    penna_thr: 1.0e+5

  backup_traj:
    uniform_time_en: true
    pos_constraint_type: 1
    piece_num: 2
    energy_cost_type: 4
    block_energy_cost: true
    opt_accuracy: 1.0e-6
    scale_factor: 1.0
    integral_reso: 12
    smooth_eps: 0.01
    penna_t: 1200.0
    penna_ts: 1.0e+5
    penna_pos: 1.0e+6
    penna_vel: 1.0e+5
    penna_acc: 1.0e+5
    penna_jerk: -1.0e+5
    penna_omg: 1.0e+5
    penna_max_acc_thr: 1.0e+5
    penna_min_acc_thr: 1.0e+5

  flatness:
    mass: 1.64
    dh: 0.35
    dv: 0.35
    cp: 0.001
    v_eps: 0.0001
    grav: 9.81


astar:
  map_voxel_num: [ 500, 500, 100 ]
  visual_process: false
  allow_diag: true
  # 0 DIAG; 1 MANHATTAN; 2 EUCLIDEAN
  heu_type: 2
  debug_visualization_en: false

rog_map:
  # 地图基本参数
  resolution: 0.3                      # 概率地图分辨率(m)
  inflation_resolution: 0.3            # 膨胀分辨率(m)
  inflation_step: 2                    # 膨胀步长
  unk_inflation_en: false
  unk_inflation_step: 1
  map_size: [15, 110, 6]               # 地图大小 [x, y, z] (m) - 注意x方向较小
  # If the map rolling is disable, the map origin [m] should be set.
  fix_map_origin: [0, 0, 0]          # 固定地图原点
  frontier_extraction_en: false

  # Virtual ceil and ground
  virtual_ceil_height: 5               # 天花板高度(m)
  virtual_ground_height: -10.5          # 地面高度(m)

  load_pcd_en: false

  map_sliding:
    enable: false                      # 禁用滑动窗口（因为已固定原点）
    threshold: 0.3

  esdf:
    enable: true
    resolution: 0.3                    # 修改为0.3，必须 >= rog_map.resolution
    # The range of esdf around the odom [m]
    local_update_box: [15, 15, 3]      # 增大ESDF更新范围以匹配地图

  # If [enable = true], the ROG-Map will actively take ros topic as input.
  # else user should call function [updateMap] to update the map.
  ros_callback:
    enable: true
    cloud_topic: "/lio/cloud_world"
    odom_topic: "/lio/odom"
    odom_timeout: 20.0

  visualization:
    enable: true
    use_dynamic_reconfigure: false
    time_rate: 2                       # 2Hz可视化更新
    frame_rate: 0
    range: [15, 15, 4]                 # 可视化范围(m)
    frame_id: "world"
    pub_unknown_map_en: false

  # Intensity filter for input point cloud
  intensity_thresh: -10                # -10表示不进行强度滤波
  point_filt_num: 1

  # Probabilistic update - 必须启用才能构建地图
  raycasting:
    enable: true                       # 改为true，启用射线投射更新地图
    batch_update_size: 1
    local_update_box: [15, 15, 5]      # 局部更新范围(m)
    # The range of raycasting [m]
    ray_range: [0.5, 30]               # 射线范围，根据LiDAR实际探测距离调整

    # 概率参数
    p_min: 0.12
    p_miss: 0.49
    p_free: 0.499
    p_occ: 0.85
    p_hit: 0.9
    p_max: 0.98
    # 未知区域阈值
    unk_thresh: 1.0